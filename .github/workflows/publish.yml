name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never cache in release builds

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build --if-present

      # No token: auth + provenance come from the OIDC id-token.
      # Unscoped package, so publish is public by default.
      - run: npm publish
