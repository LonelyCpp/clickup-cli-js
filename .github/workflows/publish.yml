name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm >= 11.5.1 (newer than the version
      # bundled with Node). Recent npm majors also require Node >= 22.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # No NODE_AUTH_TOKEN: auth + provenance come from the OIDC id-token.
      - run: npm publish --access public
